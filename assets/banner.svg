<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a051b" />
      <stop offset="50%" stop-color="#0f0c29" />
      <stop offset="100%" stop-color="#020005" />
    </linearGradient>

    <!-- Glowing Accent Gradients -->
    <linearGradient id="accentCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <linearGradient id="accentPurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f355da" />
      <stop offset="100%" stop-color="#7000ff" />
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glowSubtle" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .title-text {
      font-family: 'Outfit', 'Inter', sans-serif;
      font-weight: 800;
      font-size: 54px;
      fill: #ffffff;
      letter-spacing: 2px;
    }
    .subtitle-text {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 18px;
      fill: #a0aec0;
      letter-spacing: 6px;
    }
    /* SVG Animations for Dynamic Aspect */
    @keyframes pulse {
      0% { r: 5px; opacity: 0.4; }
      50% { r: 9px; opacity: 0.9; }
      100% { r: 5px; opacity: 0.4; }
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
    @keyframes dash {
      to {
        stroke-dashoffset: -40;
      }
    }
    .pulse-node-1 { animation: pulse 3s infinite ease-in-out; }
    .pulse-node-2 { animation: pulse 4s infinite ease-in-out; }
    .pulse-node-3 { animation: pulse 5s infinite ease-in-out; }
    .floating-group { animation: float 6s infinite ease-in-out; }
    .flow-line {
      stroke-dasharray: 8, 12;
      animation: dash 2s linear infinite;
    }
  </style>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />

  <!-- Abstract Grid/Mesh in background -->
  <g opacity="0.15">
    <path d="M 0 50 L 1200 50 M 0 150 L 1200 150 M 0 250 L 1200 250 M 0 350 L 1200 350" stroke="#4facfe" stroke-width="1" />
    <path d="M 150 0 L 150 400 M 350 0 L 350 400 M 550 0 L 550 400 M 750 0 L 750 400 M 950 0 L 950 400 M 1150 0 L 1150 400" stroke="#4facfe" stroke-width="1" />
  </g>

  <!-- Glowing background blobs -->
  <circle cx="1000" cy="200" r="180" fill="#7000ff" opacity="0.25" filter="url(#glow)" />
  <circle cx="200" cy="300" r="120" fill="#00f2fe" opacity="0.15" filter="url(#glow)" />

  <!-- Animated Neural/Attention Connections (Dynamic network graph) -->
  <g class="floating-group">
    <!-- Lines -->
    <line x1="800" y1="120" x2="950" y2="80" stroke="url(#accentCyan)" stroke-width="2" opacity="0.6" />
    <line x1="800" y1="120" x2="900" y2="220" stroke="url(#accentPurple)" stroke-width="2" opacity="0.6" />
    <line x1="950" y1="80" x2="1050" y2="160" stroke="url(#accentCyan)" stroke-width="2" opacity="0.6" />
    <line x1="900" y1="220" x2="1050" y2="160" stroke="url(#accentPurple)" stroke-width="2" opacity="0.6" />
    <line x1="900" y1="220" x2="1000" y2="300" stroke="url(#accentCyan)" stroke-width="2" opacity="0.5" />
    <line x1="1050" y1="160" x2="1120" y2="260" stroke="url(#accentPurple)" stroke-width="2" opacity="0.5" />
    <line x1="1000" y1="300" x2="1120" y2="260" stroke="url(#accentCyan)" stroke-width="2" opacity="0.6" />

    <!-- Flowing Attention Signal (Animated) -->
    <path d="M 800 120 L 950 80 L 1050 160 L 1120 260" fill="none" stroke="#f355da" stroke-width="3" class="flow-line" filter="url(#glowSubtle)" />
    <path d="M 800 120 L 900 220 L 1000 300" fill="none" stroke="#00f2fe" stroke-width="3" class="flow-line" filter="url(#glowSubtle)" />

    <!-- Nodes -->
    <circle cx="800" cy="120" r="6" fill="#ffffff" filter="url(#glowSubtle)" />
    <circle cx="800" cy="120" r="5" fill="#f355da" class="pulse-node-1" />

    <circle cx="950" cy="80" r="7" fill="#ffffff" filter="url(#glowSubtle)" />
    <circle cx="950" cy="80" r="6" fill="#00f2fe" class="pulse-node-2" />

    <circle cx="900" cy="220" r="6" fill="#ffffff" filter="url(#glowSubtle)" />
    <circle cx="900" cy="220" r="5" fill="#7000ff" class="pulse-node-3" />

    <circle cx="1050" cy="160" r="8" fill="#ffffff" filter="url(#glowSubtle)" />
    <circle cx="1050" cy="160" r="7" fill="#f355da" class="pulse-node-1" />

    <circle cx="1000" cy="300" r="6" fill="#ffffff" filter="url(#glowSubtle)" />
    <circle cx="1000" cy="300" r="5" fill="#00f2fe" class="pulse-node-2" />

    <circle cx="1120" cy="260" r="7" fill="#ffffff" filter="url(#glowSubtle)" />
    <circle cx="1120" cy="260" r="6" fill="#7000ff" class="pulse-node-3" />
  </g>

  <!-- Typography & Title -->
  <text x="80" y="190" class="title-text" filter="url(#glowSubtle)">AWESOME ATTENTION ROLLOUT</text>
  <text x="85" y="235" class="subtitle-text">INTERPRETABILITY • MECHANISTIC MODELING • VISUALIZATION</text>

  <!-- Decorative border element -->
  <rect x="15" y="15" width="1170" height="370" rx="10" fill="none" stroke="url(#accentCyan)" stroke-width="2" opacity="0.3" />
</svg>
